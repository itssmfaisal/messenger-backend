<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        h2 { color: #569cd6; }
        #log { background: #111; padding: 15px; border-radius: 6px; max-height: 400px; overflow-y: auto; }
        .log-entry { margin: 4px 0; }
        .sent { color: #4ec9b0; }
        .received { color: #dcdcaa; }
        .error { color: #f44747; }
        .system { color: #569cd6; }
        input, button { padding: 8px 12px; margin: 4px; font-size: 14px; border-radius: 4px; border: 1px solid #555; background: #2d2d2d; color: #d4d4d4; }
        button { cursor: pointer; background: #0e639c; border-color: #0e639c; }
        button:hover { background: #1177bb; }
        .section { margin: 15px 0; padding: 10px; border: 1px solid #333; border-radius: 6px; }
    </style>
</head>
<body>
    <h2>Messenger WebSocket Test</h2>

    <div class="section">
        <strong>1. Login first (get JWT token):</strong><br>
        <input id="loginUser" placeholder="Username" size="20" value="admin">
        <input id="loginPass" placeholder="Password" size="20" value="admin" type="password">
        <button onclick="login()">Login</button>
        <br><br>
        <strong>Token:</strong>
        <input id="token" placeholder="JWT token will appear here" size="70" readonly>
    </div>

    <div class="section">
        <strong>2. Connect WebSocket:</strong><br>
        <input id="url" value="http://localhost:8080/ws" size="40">
        <button onclick="connectStomp()">Connect</button>
        <button onclick="disconnectStomp()">Disconnect</button>
        <span id="status" style="margin-left:10px;">Disconnected</span>
    </div>

    <div class="section">
        <strong>3. Join Chat:</strong><br>
        <button onclick="sendJoin()">Send Join</button>
    </div>

    <div class="section">
        <strong>4. Send Message:</strong><br>
        <input id="recipient" placeholder="Recipient username" size="20">
        <input id="message" placeholder="Message content" size="30">
        <button onclick="sendMessage()">Send</button>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script>
        let stompClient = null;
        let loggedInUser = null;

        function log(text, cls) {
            const el = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + (cls || '');
            entry.textContent = new Date().toLocaleTimeString() + ' — ' + text;
            el.prepend(entry);
        }

        function login() {
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;
            if (!username || !password) { log('Enter username and password!', 'error'); return; }

            fetch('http://localhost:8080/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(res) {
                if (!res.ok) throw new Error('Login failed (HTTP ' + res.status + ')');
                return res.json();
            })
            .then(function(data) {
                document.getElementById('token').value = data.token;
                loggedInUser = username;
                log('Logged in as ' + username + ' — token received', 'system');
            })
            .catch(function(err) {
                log('Login failed: ' + err.message, 'error');
            });
        }

        function connectStomp() {
            const url = document.getElementById('url').value;
            const token = document.getElementById('token').value;
            if (!token) { log('Login first to get a token!', 'error'); return; }

            const sock = new SockJS(url);
            stompClient = Stomp.over(sock);

            stompClient.connect({ Authorization: 'Bearer ' + token }, function (frame) {
                document.getElementById('status').textContent = 'Connected as ' + loggedInUser + ' ✅';
                document.getElementById('status').style.color = '#4ec9b0';
                log('CONNECTED: ' + frame, 'system');

                stompClient.subscribe('/user/queue/messages', function (msg) {
                    log('📩 Private: ' + msg.body, 'received');
                });
                log('Subscribed to /user/queue/messages', 'system');

                stompClient.subscribe('/topic/status', function (msg) {
                    log('🟢 Status: ' + msg.body, 'received');
                });
                log('Subscribed to /topic/status', 'system');

                stompClient.subscribe('/user/queue/errors', function (msg) {
                    log('❌ Error: ' + msg.body, 'error');
                });
                log('Subscribed to /user/queue/errors', 'system');
            }, function (error) {
                document.getElementById('status').textContent = 'Disconnected ❌';
                document.getElementById('status').style.color = '#f44747';
                log('CONNECTION ERROR: ' + error, 'error');
            });
        }

        function disconnectStomp() {
            if (stompClient) {
                stompClient.disconnect(function () {
                    document.getElementById('status').textContent = 'Disconnected';
                    document.getElementById('status').style.color = '#d4d4d4';
                    log('Disconnected', 'system');
                });
            }
        }

        function sendJoin() {
            if (!stompClient) { log('Connect first!', 'error'); return; }
            stompClient.send('/app/chat.join', {}, '{}');
            log('SENT join', 'sent');
        }

        function sendMessage() {
            const recipient = document.getElementById('recipient').value;
            const content = document.getElementById('message').value;
            if (!recipient || !content) { log('Fill in recipient and message!', 'error'); return; }
            if (!stompClient) { log('Connect first!', 'error'); return; }

            const payload = JSON.stringify({ recipient: recipient, content: content });
            stompClient.send('/app/chat.send', {}, payload);
            log('SENT message: ' + payload, 'sent');
        }
    </script>
</body>
</html>
