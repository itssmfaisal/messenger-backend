spring.application.name=messenger

# JWT settings
jwt.secret=ThisIsAVerySecretKeyForJWTSign32
jwt.expiration-ms=86400000

spring.datasource.url=jdbc:postgresql://localhost:5432/messengerdb
spring.datasource.username=messenger_user
spring.datasource.password=change-me
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL example (uncomment and set credentials to use Postgres instead of H2)
#spring.datasource.url=jdbc:postgresql://localhost:5432/messengerdb
#spring.datasource.username=messenger_user
#spring.datasource.password=change-me
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update

# Notes:
# 1) Install PostgreSQL on your machine, create a database and user.
# 2) Ensure the PostgreSQL JDBC driver is present in `build.gradle`:
#    implementation 'org.postgresql:postgresql:42.5.4'
# 3) Then uncomment the lines above and restart the app.

